name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE*', '.gitignore']
  pull_request:
    paths-ignore: ['**.md', 'docs/**', 'LICENSE*', '.gitignore']
  workflow_dispatch:

jobs:
  security:
    name: Security
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check for AI artifact leakage
        run: |
          echo "Checking for AI artifact leakage..."
          FAILED=false

          # Submodule guard: every entry in .gitmodules must remain a
          # gitlink (commit type in the tree), and its working-tree
          # directory must stay empty in CI. Private submodule contents
          # must never ride along with this public repo's CI artifacts.
          if [ -f .gitmodules ]; then
            for sub in $(git config -f .gitmodules --get-regexp 'submodule\..*\.path' | awk '{print $2}'); do
              type=$(git ls-tree HEAD "$sub" 2>/dev/null | awk '{print $2}')
              if [ "$type" != "commit" ]; then
                echo "::error::Submodule $sub is no longer a gitlink - its contents may have been committed to this public repo"
                FAILED=true
              fi
              if [ -d "$sub" ] && [ "$(ls -A "$sub" 2>/dev/null)" ]; then
                echo "::error::$sub/ has contents - submodule should not be checked out in CI"
                FAILED=true
              fi
            done
          fi

          find . -type l 2>/dev/null | while read link; do
            target=$(readlink "$link" 2>/dev/null || echo "")
            if [[ "$target" == *"hyperi-ai/"* ]] || [[ "$target" == *"/ai/"* ]]; then
              echo "::error::$link symlinks into a submodule directory"
              FAILED=true
            fi
          done

          if grep -rE "hyperi-io/(ai|hs-ai|standards|hyperi-ai)" \
             --include="*.yml" --include="*.yaml" --include="*.json" \
             . 2>/dev/null | grep -v "^\.git" | grep -v ".gitmodules"; then
            echo "::error::Found references to private hyperi-io repos in tracked YAML/JSON"
            FAILED=true
          fi

          if [ "$FAILED" = true ]; then
            echo "=========================================="
            echo "SECURITY CHECK FAILED"
            echo "=========================================="
            exit 1
          fi

          echo "✓ AI artifact check passed"

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz | tar xz
          chmod +x gitleaks

      - name: Run Gitleaks
        run: ./gitleaks detect --source . --verbose

  quality:
    name: Quality
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Match VS Code's bundled Node -- Electron 37/38 -> Node 22.x as of
          # 2026, Node 24 not until Electron 40. Test on the same major as the
          # extension runtime to catch API mismatches Node 24 would accept.
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check for build errors
        run: |
          if [ ! -f dist/extension.js ]; then
            echo "::error::Build failed - dist/extension.js not found"
            exit 1
          fi
          echo "✓ Build successful"

      - name: Verify package.json
        run: |
          # Check required fields exist
          node -e "
            const pkg = require('./package.json');
            const required = ['name', 'displayName', 'version', 'publisher', 'engines', 'main'];
            const missing = required.filter(f => !pkg[f]);
            if (missing.length) {
              console.error('Missing required fields:', missing.join(', '));
              process.exit(1);
            }
            console.log('✓ package.json valid');
          "

  package:
    name: Package
    needs: [security, quality]
    runs-on: ${{ vars.GH_RUNNER_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Match VS Code's bundled Node -- Electron 37/38 -> Node 22.x as of
          # 2026, Node 24 not until Electron 40. Test on the same major as the
          # extension runtime to catch API mismatches Node 24 would accept.
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: claudemeter-vsix
          path: '*.vsix'
          retention-days: 7
